name: Daily Brief

on:
  workflow_dispatch:
  schedule:
    - cron: '15 10 * * *'   # 5:15 AM CT / 10:15 UTC (after ingest)

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: data/articles.db
          key: articles-db-${{ github.run_id }}
          restore-keys: |
            articles-db-

      - name: Run digest (process + render + publish + email)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          MIN_RELEVANCE_SCORE: "6.5"
          MAX_DIGEST_ARTICLES: "12"
          SEND_EMAIL: "true"
          PUBLISH_ARCHIVE: "true"
        run: python run_digest.py

      - name: Commit archive + database
        run: |
          git config user.name "LA Intelligence Bot"
          git config user.email "actions@github.com"
          git add archive/ data/articles.db || true
          git diff --staged --quiet || git commit -m "digest: daily brief $(date +%Y-%m-%d) [skip ci]"
          git push
