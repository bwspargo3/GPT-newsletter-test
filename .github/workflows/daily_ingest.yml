name: Daily Ingest

on:
  workflow_dispatch:   # manual trigger for testing
  schedule:
    - cron: '0 10 * * *'   # 5:00 AM CT (UTC-5) / 10:00 UTC

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: data/articles.db
          key: articles-db-${{ github.run_id }}
          restore-keys: |
            articles-db-

      - name: Run ingestion
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_ingest.py

      - name: Commit database update
        run: |
          git config user.name "LA Intelligence Bot"
          git config user.email "actions@github.com"
          git add data/articles.db || true
          git diff --staged --quiet || git commit -m "chore: update articles.db [skip ci]"
          git push
