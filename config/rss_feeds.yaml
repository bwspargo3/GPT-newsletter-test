  # Industry News
  # FIXED: confirmed live — insurancenewsnet.com exposes WordPress's default
  # ?feed=rss on every topic archive page, even though the old bare /feed
  # path is gone. Verified this returns real application/rss+xml content.
  - url: https://insurancenewsnet.com/topics/top-stories?feed=rss
    name: InsuranceNewsNet
    category: MARKET_INTELLIGENCE
  # PARTIALLY FIXED, RISK FLAGGED: the real feed lives on FeedBlitz, not
  # thinkadvisor.com itself (ALM Media's CMS doesn't serve its own RSS).
  # FeedBlitz IP-reputation-blocks requests from networks with any history
  # of abuse — this includes many shared/cloud IP ranges, which is exactly
  # what GitHub Actions runners use. Expect this feed to intermittently
  # fail with an "Access Denied" page (which will surface as a feedparser
  # bozo error) for reasons unrelated to your code. If it fails
  # consistently, that's FeedBlitz blocking GitHub's IP range, not a config
  # mistake — there's no client-side fix for that short of self-hosting a
  # proxy with a clean IP.
  - url: https://feeds.feedblitz.com/thinkadvisor
    name: ThinkAdvisor
    category: MARKET_INTELLIGENCE
